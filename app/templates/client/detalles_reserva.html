<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Reserva</title>
    <link rel="icon" href="data:,"> 
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos_reservas.css') }}">
    <script type="module" src="{{ url_for('static', filename='javascript/main.js') }}"></script>
</head>
<body>
    <main id="contenedor">

        <div id="tpl-reserva">
            <header><h1>RESERVA</h1></header>
            <form id="form-reserva">
                <div class="grupo-entrada">
                    <label>Fecha</label>
                    <input type="date" name="fec" id="v_fec" required>
                </div>
                <div class="grupo-entrada">
                    <label>Bloque Horario</label>
                    <button type="button" id="btn_hora_reserva" class="campo-hora-btn" onclick="abrirModalHoraReserva()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
                            <path d="M12 7v5l3 3" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <span id="hora_display_reserva">Seleccionar hora</span>
                    </button>
                    <input type="hidden" name="hor" id="v_hor" required>
                </div>

                <div id="modal_hora_reserva" class="modal-hora-overlay oculto-hora">
                    <div class="modal-hora-caja">
                        <p class="modal-hora-ttlo">SELECCIONA LA HORA</p>
                        <div class="modal-horas-grid" id="horas_grid_reserva"></div>
                        <button type="button" class="modal-hora-cerrar" onclick="cerrarModalHoraReserva()">CANCELAR</button>
                    </div>
                </div>
                
                <div class="grupo-entrada">
                    <label>Temática</label>
                    <select name="tematica" id="v_tematica" required>
                        {% if tematicas and tematicas|length > 0 %}
                            <option value="" disabled selected>Selecciona una temática...</option>
                            {% for t in tematicas %}
                                <option value="{{ t.tematica_id }}">{{ t.nombre_tematica }}</option>
                            {% endfor %}
                        {% else %}
                            <option value="" disabled selected>Cargando temáticas...</option>
                        {% endif %}
                    </select>
                </div>
                <div class="grupo-entrada">
                     
                    <label>Personas</label>
                    <input type="number" name="personas" value="1" max="12" min="1" maxlength="2"
                    >
                </div>
                <div class="grupo-entrada">
                    <label>Piso</label>
                    <select name="piso">
                        <option value="1">Piso 1</option>
                        <option value="2">Piso 2</option>
                    </select>
                </div>
                <div class="grupo-entrada">
                    <label>Metodo de pago</label>
                    <select name="metodo_pago" id="v_metodo_pago">
                        <option value="0">Efectivo</option>
                        <option value="1">Transferencia</option>
                    </select>
                </div>
                <div class="grupo-habeas">
                    <label class="habeas-label">
                        <input type="checkbox" name="habeas" id="habeas-datos" required>
                        <span>Autorizo la recopilación y tratamiento de mis datos personales conforme a la política de <strong>Habeas Data</strong> de Sabores Unidos. Mi información será usada únicamente para gestionar la reserva.</span>
                    </label>
                </div>
                <div class="contenedor-botones">
                    <button type="button" class="btn-atras" onclick="window.location.href='/datos_cliente'">VOLVER</button>
                    <button type="submit" class="btn-grande2" id="btn-submit">RESERVAR</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
