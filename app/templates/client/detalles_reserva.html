<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Reserva</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos_reservas.css') }}">
    <script type="module" src="{{ url_for('static', filename='javascript/main.js') }}"></script>
</head>
<body>
    <main id="contenedor">

        <div id="tpl-reserva">
            <header><h1>RESERVA</h1></header>
            <form id="form-reserva">
                <div class="grupo-entrada">
                    <label>Fecha</label>
                    <input type="date" name="fec" id="v_fec" required>
                </div>
                <div class="grupo-entrada">
                    <label>Bloque Horario</label>
                    <button type="button" id="btn_hora_reserva" class="campo-hora-btn" onclick="abrirModalHoraReserva()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
                            <path d="M12 7v5l3 3" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <span id="hora_display_reserva">Seleccionar hora</span>
                    </button>
                    <input type="hidden" name="hor" id="v_hor" required>
                </div>

                <div id="modal_hora_reserva" class="modal-hora-overlay oculto-hora">
                    <div class="modal-hora-caja">
                        <p class="modal-hora-ttlo">SELECCIONA LA HORA</p>
                        <div class="modal-horas-grid" id="horas_grid_reserva"></div>
                        <button type="button" class="modal-hora-cerrar" onclick="cerrarModalHoraReserva()">CANCELAR</button>
                    </div>
                </div>
                <div class="grupo-entrada">
                    <label>Temática</label>
                    <select name="tematica" id="v_tematica" required>
                        <option value="" disabled selected>Cargando temáticas...</option>
                        </select>
                </div>
                <div class="grupo-entrada">
                     
                    <label>Personas</label>
                    <input type="number" name="personas" value="1" min="1">
                </div>
                <div class="grupo-entrada">
                    <label>Piso</label>
                    <select name="piso">
                        <option value="1">Piso 1</option>
                        <option value="2">Piso 2</option>
                    </select>
                </div>
                <div class="grupo-entrada">
                    <label>Metodo de pago</label>
                    <select name="metodo_pago" id="v_metodo_pago">
                        <option value="0">Efectivo</option>
                        <option value="1">Transferencia</option>
                    </select>
                </div>
                <div class="contenedor-botones">
                    <button type="button" class="btn-atras" onclick="window.history.back()">VOLVER</button>
                    <button type="submit" class="btn-grande2" id="btn-submit">RESERVAR</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const HORAS_DISPONIBLES = [16,17,18,19,20,21,22,23];

        function generarBloques() {
            return HORAS_DISPONIBLES.map(h => {
                const ampm = h < 12 ? 'AM' : 'PM';
                const h12 = h % 12 === 0 ? 12 : h % 12;
                return {
                    label: `${h12}:00 ${ampm}`,
                    valor: `${String(h).padStart(2,'0')}:00`
                };
            });
        }

        function abrirModalHoraReserva() {
            const grid = document.getElementById('horas_grid_reserva');
            grid.innerHTML = '';

            const fechaInput = document.getElementById('v_fec').value;
            const hoy = new Date();
            const hoySolo = hoy.toISOString().split('T')[0];
            const esHoy = fechaInput === hoySolo;
            const horaActual = hoy.getHours();
            const valorActual = document.getElementById('v_hor').value;

            generarBloques().forEach(bloque => {
                const h = parseInt(bloque.valor);
                const bloqueada = esHoy && h <= horaActual;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = bloque.label;
                btn.className = 'chip-hora';

                if (bloqueada) {
                    btn.classList.add('chip-bloqueada');
                    btn.disabled = true;
                } else {
                    if (bloque.valor === valorActual) btn.classList.add('chip-activa');
                    btn.addEventListener('click', () => seleccionarHoraReserva(bloque.label, bloque.valor));
                }
                grid.appendChild(btn);
            });

            document.getElementById('modal_hora_reserva').classList.remove('oculto-hora');
        }

        function seleccionarHoraReserva(label, valor) {
            document.getElementById('v_hor').value = valor;
            document.getElementById('hora_display_reserva').textContent = label;
            cerrarModalHoraReserva();
        }

        function cerrarModalHoraReserva() {
            document.getElementById('modal_hora_reserva').classList.add('oculto-hora');
        }

        document.addEventListener('click', function(e) {
            const overlay = document.getElementById('modal_hora_reserva');
            if (e.target === overlay) cerrarModalHoraReserva();
        });
    </script>
</body>
</html>
