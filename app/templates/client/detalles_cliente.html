<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/static/img/sabores-unidos.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles cliente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos_reservas.css') }}">
    <script type="module" src="{{ url_for('static', filename='javascript/main.js') }}"></script>

</head>
<body>
    <main id="contenedor">   
        <div id="tpl-paso1">
            <header><h1>TUS DATOS</h1></header>
            <form id="form-paso1">
                <div class="grupo-entrada">
                    <label>Nombre</label>
                    <input type="text" name="nom" maxlength="60" minlength="2" placeholder="Juan Posada" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{2,60}" tabindex="1" required>
                </div>
                <div class="grupo-entrada">
                    <label>Cédula</label>
                    <input type="text" inputmode="numeric" name="doc" maxlength="10" minlength="6" placeholder="1112000000" pattern="[0-9]{6,10}" title="!Opss, Estas intentando ingresar letras o algun otro caracter. Por favor solo ingresa numeros." tabindex="2" required>
                </div>
                <div class="grupo-entrada">
                    <label>Correo</label>
                    <input type="email" name="correo" inputmode="email" maxlength="60" minlength="8" placeholder="ejemplo@gmail.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" tabindex="3" required>
                </div>
                <div class="grupo-entrada">
                    <label>Teléfono</label>
                    <input type="tel" name="tel" inputmode="tel" maxlength="10" minlength="10" placeholder="3154444444" pattern="[0-9]{10}" tabindex="4" required>
                </div>
                <div class="grupo-habeas">
                    <label class="habeas-label">
                        <input type="checkbox" name="habeas" id="habeas-datos" required>
                        <span>Autorizo la recopilación y tratamiento de mis datos personales conforme a la política de <strong>Habeas Data</strong> de Sabores Unidos. Mi información será usada únicamente para gestionar el pedido.</span>
                    </label>
                </div>
                <div class="contenedor-botones">
                    <button type="button" class="btn-atras" window.location.href='/menu'>VOLVER</button>
                    <button type="submit" class="btn-grande2" tabindex="5">CONTINUAR</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
